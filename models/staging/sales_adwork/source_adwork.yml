version: 2

# ==========================================
# 1. FONTES (Dados brutos do banco)
# ==========================================
sources:
  - name: adwork
    database: fea_academy
    schema: adventure_works
    tables:
      - name: sales_salesorderheader
        description: Tabela bruta com informações de cabeçalho do pedido.
        columns:
          - name: salesorderid
            description: Chave primária da tabela de pedidos.
            tests:
              - unique
              - not_null

          - name: customerid
            description: Chave estrangeira para a tabela de clientes.
            tests:
              - not_null

          - name: shiptoaddressid
            description: Chave estrangeira para o endereço de entrega.
            tests:
              - not_null

      - name: sales_salesorderdetail
        description: Tabela bruta com informações de itens/detalhes dos pedidos.
        columns:
          - name: salesorderid
            description: Chave estrangeira para a tabela de pedidos.
            tests:
              - not_null

          - name: productid
            description: Chave estrangeira para a tabela de produtos.
            tests:
              - not_null

      - name: sales_salesorderheadersalesreason
        description: Tabela bruta com o relacionamento entre pedidos e motivos de venda.
        columns:
          - name: salesorderid
            description: ID do pedido.
            tests:
              - not_null

          - name: salesreasonid
            description: ID do motivo da venda.
            tests:
              - not_null

      - name: sales_salesreason
        description: Tabela bruta com os nomes e categorias dos motivos de venda.

      - name: sales_customer
        description: Tabela bruta com os dados de clientes.
        columns:
          - name: customerid
            description: Chave primária da tabela de clientes.
            tests:
              - not_null
              - unique

      - name: person_person
        description: Tabela bruta com os dados de pessoas/contatos.
        columns:
          - name: businessentityid
            description: Chave primária da tabela de pessoas.
            tests:
              - not_null
              - unique

      - name: sales_store
        description: Tabela bruta com os dados de lojas (pessoas jurídicas).
        columns:
          - name: businessentityid
            description: Chave primária da tabela de lojas.
            tests:
              - not_null
              - unique

      - name: sales_creditcard
        description: Tabela bruta com informações dos cartões de crédito.
        columns:
          - name: creditcardid
            description: Chave primária dos cartões.
            tests:
              - not_null
              - unique

      - name: person_address
        description: Tabela bruta para os dados de endereços.
        columns:
          - name: addressid
            description: Chave primária dos endereços.
            tests:
              - not_null
              - unique

          - name: stateprovinceid
            description: Chave estrangeira para o estado/província.
            tests:
              - not_null

      - name: person_stateprovince
        description: Tabela bruta para os dados de estados e províncias.
        columns:
          - name: stateprovinceid
            description: Chave primária do estado/província.
            tests:
              - not_null
              - unique

          - name: countryregioncode
            description: Código do país/região.
            tests:
              - not_null

          - name: stateprovincecode
            description: Código do estado/província.
            tests:
              - not_null
      - name: person_countryregion
        description: Tabela bruta para os dados de estados e províncias.
        columns:
          - name: countryregioncode
            description: Chave primária do estado/província.
            tests:
              - not_null
              - unique

# ==========================================
# 2. MODELOS (Transformações criadas no dbt)
# ==========================================
models:
  - name: stg_adwork__order_details
    description: Staging tratada com os detalhes dos itens dos pedidos.
    columns:
      - name: order_item_sk
        description: Surrogate key gerada a partir de salesorderid e salesorderdetailid.
        tests:
          - unique
          - not_null